<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日记本</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="login-view" id="loginView" aria-labelledby="loginTitle">
      <div class="login-panel">
        <p class="eyebrow">Private Diary</p>
        <h1 id="loginTitle">日记本</h1>
        <p class="login-note" id="loginNote">第一次使用时，请设置一个密码。之后需要输入这个密码才能查看日记。</p>

        <form class="login-form" id="loginForm">
          <label for="passwordInput">密码</label>
          <input id="passwordInput" type="password" autocomplete="current-password" minlength="6" required>
          <button class="primary-button" type="submit" id="loginButton">进入日记</button>
          <p class="message" id="loginMessage" role="status"></p>
        </form>
      </div>
    </section>

    <section class="diary-view" id="diaryView" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">Personal Journal</p>
          <h1>日记本</h1>
        </div>
        <div class="top-actions">
          <p class="sync-summary" id="syncStatus">本机保存</p>
          <button class="summary" id="entrySummaryButton" type="button"><span id="entryCount">0</span> 篇</button>
          <button class="ghost-button" id="changePasswordButton" type="button">修改密码</button>
          <button class="ghost-button" id="logoutButton" type="button">退出登录</button>
        </div>
      </header>

      <section class="workspace" aria-label="日记工作区">
        <form class="diary-form" id="diaryForm">
          <div class="field">
            <label for="entryTitle">标题</label>
            <input id="entryTitle" type="text" maxlength="50" required>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="entryDate">日期</label>
              <input id="entryDate" type="date" required>
            </div>
            <div class="field">
              <label for="entryMood">心情</label>
              <input id="entryMood" type="text" maxlength="16" list="moodOptions" value="平静" placeholder="平静、开心、紧张...">
              <datalist id="moodOptions">
                <option value="平静"></option>
                <option value="开心"></option>
                <option value="忙碌"></option>
                <option value="疲惫"></option>
                <option value="难忘"></option>
                <option value="期待"></option>
                <option value="焦虑"></option>
                <option value="感恩"></option>
              </datalist>
            </div>
          </div>

          <div class="field">
            <label for="entryCategory">分类</label>
            <input id="entryCategory" type="text" maxlength="24" list="categoryOptions" placeholder="生活、账务、家庭、工作...">
            <datalist id="categoryOptions"></datalist>
          </div>

          <div class="field">
            <label for="entryContent">内容</label>
            <textarea id="entryContent" rows="9" maxlength="2000" required></textarea>
          </div>

          <div class="field">
            <label for="entryAttachment">附件</label>
            <input id="entryAttachment" type="file" multiple>
          </div>

          <div class="image-preview-grid" id="imagePreview" hidden></div>
          <div class="attachment-editor-list" id="attachmentEditorList"></div>

          <section class="related-editor" aria-label="关联日记">
            <div class="section-heading">
              <h3>关联日记</h3>
              <button class="ghost-button compact-button" id="openRelatedPicker" type="button">选择</button>
            </div>
            <div class="related-selected-list" id="relatedSelectedList"></div>
          </section>

          <section class="link-editor" aria-label="链接附件">
            <div class="form-row">
              <div class="field">
                <label for="linkTitle">链接名称</label>
                <input id="linkTitle" type="text" maxlength="60" placeholder="水费账户">
              </div>
              <div class="field">
                <label for="linkUrl">网址</label>
                <input id="linkUrl" type="url" placeholder="https://...">
              </div>
            </div>
            <button class="ghost-button" id="addLinkButton" type="button">添加链接</button>
            <div class="link-list" id="linkList"></div>
          </section>

          <div class="form-actions">
            <button class="primary-button" type="submit" id="saveEntryButton">保存日记</button>
            <button class="ghost-button" id="cancelEditButton" type="button" hidden>取消编辑</button>
          </div>
          <p class="save-status" id="saveStatus" role="status"></p>
        </form>

        <section class="entries-panel" aria-labelledby="entriesTitle">
          <div class="panel-header">
            <h2 id="entriesTitle">日记列表</h2>
            <button class="danger-button" id="clearEntries" type="button">清空</button>
          </div>
          <div class="filters" aria-label="筛选日记">
            <input id="searchInput" type="search" placeholder="搜索标题、内容、分类或链接">
          </div>
          <div class="entries-list" id="entriesList"></div>
        </section>
      </section>
    </section>
  </main>

  <dialog class="entry-dialog" id="entryDialog" aria-labelledby="dialogEntryTitle">
    <article class="entry-dialog-panel">
      <header class="entry-dialog-header">
        <div>
          <div class="entry-meta" id="dialogEntryMeta"></div>
          <h2 id="dialogEntryTitle"></h2>
        </div>
        <div class="dialog-header-actions">
          <button class="ghost-button compact-button" id="dialogEditEntry" type="button">编辑</button>
          <button class="dialog-close-button" id="closeEntryDialog" type="button" aria-label="关闭日记详情">×</button>
        </div>
      </header>
      <p class="entry-dialog-content" id="dialogEntryContent"></p>
      <section class="entry-dialog-related" id="dialogEntryRelated" hidden>
        <h3>关联日记</h3>
        <div class="related-view-list" id="dialogRelatedList"></div>
      </section>
      <div class="entry-dialog-images" id="dialogEntryImages"></div>
      <section class="entry-dialog-attachments" id="dialogEntryAttachments" hidden>
        <h3>附件</h3>
        <div class="attachment-view-list" id="dialogAttachmentList"></div>
      </section>
      <section class="entry-dialog-link-section" id="dialogEntryLinkSection" hidden>
        <h3>相关链接</h3>
        <div class="entry-dialog-links" id="dialogEntryLinks"></div>
      </section>
    </article>
  </dialog>

  <dialog class="entry-dialog directory-dialog" id="directoryDialog" aria-labelledby="directoryTitle">
    <article class="entry-dialog-panel">
      <header class="entry-dialog-header">
        <div>
          <div class="entry-meta">全部日记</div>
          <h2 id="directoryTitle">日记目录</h2>
        </div>
        <button class="dialog-close-button" id="closeDirectoryDialog" type="button" aria-label="关闭日记目录">×</button>
      </header>
      <div class="directory-list" id="directoryList"></div>
    </article>
  </dialog>

  <dialog class="entry-dialog picker-dialog" id="relatedPickerDialog" aria-labelledby="relatedPickerTitle">
    <article class="entry-dialog-panel">
      <header class="entry-dialog-header">
        <div>
          <div class="entry-meta">建立事情脉络</div>
          <h2 id="relatedPickerTitle">选择关联日记</h2>
        </div>
        <button class="dialog-close-button" id="closeRelatedPicker" type="button" aria-label="关闭关联日记选择">×</button>
      </header>
      <input id="relatedSearchInput" type="search" placeholder="搜索标题、内容、分类或附件">
      <div class="related-picker-list" id="relatedPickerList"></div>
      <div class="form-actions dialog-actions">
        <button class="primary-button" id="saveRelatedSelection" type="button">保存关联</button>
        <button class="ghost-button" id="cancelRelatedSelection" type="button">取消</button>
      </div>
    </article>
  </dialog>

  <dialog class="entry-dialog password-dialog" id="passwordDialog" aria-labelledby="passwordDialogTitle">
    <article class="entry-dialog-panel">
      <header class="entry-dialog-header">
        <div>
          <div class="entry-meta">账号安全</div>
          <h2 id="passwordDialogTitle">修改密码</h2>
        </div>
        <button class="dialog-close-button" id="closePasswordDialog" type="button" aria-label="关闭修改密码">×</button>
      </header>
      <form class="password-form" id="passwordForm">
        <div class="field">
          <label for="oldPasswordInput">当前密码</label>
          <input id="oldPasswordInput" type="password" autocomplete="current-password" minlength="6" required>
        </div>
        <div class="field">
          <label for="newPasswordInput">新密码</label>
          <input id="newPasswordInput" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="field">
          <label for="confirmPasswordInput">确认新密码</label>
          <input id="confirmPasswordInput" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <p class="save-status" id="passwordStatus" role="status"></p>
        <div class="form-actions dialog-actions">
          <button class="primary-button" id="savePasswordButton" type="submit">保存新密码</button>
          <button class="ghost-button" id="cancelPasswordButton" type="button">取消</button>
        </div>
      </form>
    </article>
  </dialog>

  <template id="entryTemplate">
    <article class="entry-card">
      <div class="entry-body">
        <div class="entry-meta">
          <span class="entry-mood"></span>
          <span class="entry-category"></span>
          <time class="entry-date"></time>
        </div>
        <h3 class="entry-title"></h3>
        <p class="entry-content"></p>
        <div class="entry-images"></div>
        <p class="entry-attachment-summary" hidden></p>
        <div class="entry-links"></div>
      </div>
      <div class="entry-actions">
        <button class="primary-button view-button" type="button">查看</button>
        <button class="ghost-button edit-button" type="button">编辑</button>
        <button class="delete-button" type="button" aria-label="删除日记">删除</button>
      </div>
    </article>
  </template>

  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/mammoth.browser.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
