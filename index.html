<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Web Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-copy">
        <p class="eyebrow">Codex Studio</p>
        <h1 id="hero-title">这是一个用 Codex 制作的网页</h1>
        <p class="subtitle">一个简洁、清爽的主页示例，适合继续扩展成产品展示、个人主页或项目入口。</p>
        <div class="actions">
          <a class="button primary" href="#preview">查看页面</a>
          <a class="button secondary" href="#about">了解更多</a>
        </div>
      </div>
      <div class="visual" aria-hidden="true">
        <div class="window">
          <div class="window-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="code-lines">
            <i></i>
            <i></i>
            <i></i>
            <i></i>
            <i></i>
          </div>
        </div>
      </div>
    </section>

    <section id="preview" class="feature-band">
      <article>
        <span class="number">01</span>
        <h2>清晰</h2>
        <p>页面结构简单，重点内容一眼可见。</p>
      </article>
      <article>
        <span class="number">02</span>
        <h2>响应式</h2>
        <p>手机和电脑屏幕都能正常显示。</p>
      </article>
      <article id="about">
        <span class="number">03</span>
        <h2>可扩展</h2>
        <p>后续可以继续添加图片、导航、表单和后台接口。</p>
      </article>
    </section>
  </main>
</body>
</html>
